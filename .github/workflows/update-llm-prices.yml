name: Update LLM API Prices

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  scrape-prices:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r projects/llm-api-pricing-scraper/requirements.txt

      - name: Run scraper
        run: |
          python projects/llm-api-pricing-scraper/src/scrape_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add projects/llm-api-pricing-scraper/data/prices.json
          if git diff --cached --quiet; then
            echo "No pricing update."
            exit 0
          fi
          git commit -m "chore: update llm api prices"
          git push
